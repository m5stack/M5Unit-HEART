name: Build(esp-idf-native)

on:
  push:
    tags-ignore:
      - '*.*.*'
      - 'v*.*.*'
    branches:
      - '*'
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'CMakeLists.txt'
      - 'idf_component.yml'
      - 'examples/UnitUnified/**.cpp'
      - 'examples/UnitUnified/**.hpp'
      - 'examples/UnitUnified/**.h'
      - 'examples/UnitUnified/**.c'
      - 'examples/UnitUnified/**/CMakeLists.txt'
      - 'examples/UnitUnified/**/Kconfig.projbuild'
      - 'examples/UnitUnified/common/**'
      - '.github/workflows/esp-idf-build-check.yml'
  pull_request:
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'CMakeLists.txt'
      - 'idf_component.yml'
      - 'examples/UnitUnified/**.cpp'
      - 'examples/UnitUnified/**.hpp'
      - 'examples/UnitUnified/**.h'
      - 'examples/UnitUnified/**.c'
      - 'examples/UnitUnified/**/CMakeLists.txt'
      - 'examples/UnitUnified/**/Kconfig.projbuild'
      - 'examples/UnitUnified/common/**'
      - '.github/workflows/esp-idf-build-check.yml'
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cross design: variant coverage on esp32s3 (both Target units x both LCD/serial examples plus the
# variant-less DualSensor), chip coverage on the other SoCs with the default I2C variant
# (UnitHeart / PlotToSerial). DualSensor drives both units at once so it has no Kconfig USING_*
# variant; it is built only in the variant job.
jobs:
  # Variant coverage: every Target unit / example on esp32s3 (LCD-capable dual-core Xtensa with PSRAM).
  build-variants:
    name: ${{ matrix.idf }} esp32s3 ${{ matrix.example_config.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        # idf boundaries: 5.1.7 = oldest legacy-driver (5.0.x dropped: M5GFX needs esp_mm added
        # in 5.1), 5.4.4 = new driver/*_master.h era, 5.5.4 = latest.
        idf: [v5.1.7, v5.4.4, v5.5.4]
        example_config:
          - label: PlotToSerial-UnitHeart
            example_path: examples/UnitUnified/PlotToSerial
            variant: USING_UNIT_HEART
          - label: PlotToSerial-HatHeart
            example_path: examples/UnitUnified/PlotToSerial
            variant: USING_HAT_HEART
          - label: GraphicalMeter-UnitHeart
            example_path: examples/UnitUnified/GraphicalMeter
            variant: USING_UNIT_HEART
          - label: GraphicalMeter-HatHeart
            example_path: examples/UnitUnified/GraphicalMeter
            variant: USING_HAT_HEART
          - label: DualSensor (no variant)
            example_path: examples/UnitUnified/DualSensor
            variant: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Kconfig variant
        # The example's own sdkconfig.defaults is not read (top CMakeLists points SDKCONFIG_DEFAULTS
        # at common/sdkconfig.defaults). Append the choice to common/ in the CI workspace only.
        # DualSensor has no variant, so nothing is appended for it.
        run: |
          if [ -n "${{ matrix.example_config.variant }}" ]; then
            echo "" >> examples/UnitUnified/common/sdkconfig.defaults
            echo "CONFIG_EXAMPLE_${{ matrix.example_config.variant }}=y" >> examples/UnitUnified/common/sdkconfig.defaults
          fi

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf }}
          target: esp32s3
          path: ${{ matrix.example_config.example_path }}

  # Chip coverage: PlotToSerial (UnitHeart / GROVE I2C) on every other supported SoC. esp32 =
  # classic Xtensa dual-core. esp32c6 (NanoC6) / esp32h2 (NanoH2) = RISC-V single-core, exercises
  # the app_main CONFIG_FREERTOS_UNICORE feedIdle branch. esp32p4 (M5Stack Tab5) = RISC-V dual-core;
  # the sdkconfig.defaults.esp32p4 overlay (chip-rev minimum keys) is auto-applied.
  build-chips:
    name: ${{ matrix.idf }} ${{ matrix.target }} PlotToSerial-UnitHeart
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        target: [esp32, esp32c6, esp32h2, esp32p4]
        idf: [v5.1.7, v5.4.4, v5.5.4]
        exclude:
          # esp32p4 stable from IDF v5.3 (M5GFX P4 verified on 5.4/5.5). 5.1.7 not applicable.
          - target: esp32p4
            idf: v5.1.7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Kconfig variant
        run: |
          echo "" >> examples/UnitUnified/common/sdkconfig.defaults
          echo "CONFIG_EXAMPLE_USING_UNIT_HEART=y" >> examples/UnitUnified/common/sdkconfig.defaults

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf }}
          target: ${{ matrix.target }}
          path: examples/UnitUnified/PlotToSerial
